  release:
    name: Create GitHub Release
    needs: [build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LocalMind ${{ github.ref_name }}
          body: |
            ## Install

            **macOS (Apple Silicon — M1/M2/M3/M4):** download the `.dmg` file.

            > **First launch on macOS:** because the app is not yet notarized, macOS will
            > block it on first open.  After the dialog appears, go to
            > **System Settings → Privacy & Security → Security** and click **"Open Anyway"**,
            > then relaunch LocalMind.  You only need to do this once.
          files: |
            artifacts/macos-dmg-arm64/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
