name: Build LocalMind

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10" }
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: cd localmind/frontend && npm install
      - run: cd localmind && pip install -r backend/requirements.txt pyinstaller
      - run: cargo install tauri-cli --version "^2"
      - run: cd localmind && python build_backend.py
      - run: cd localmind && cargo tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: localmind/src-tauri/target/release/bundle/msi/*.msi
      - uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: localmind/src-tauri/target/release/bundle/nsis/*.exe

  release:
    name: Create GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LocalMind ${{ github.ref_name }}
          body: |
            ## Install

            **Windows:** download the `.msi` or `.exe` installer.
          files: |
            artifacts/windows-msi/*.msi
            artifacts/windows-nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
