name: Build LocalMind

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  # Opt into Node.js 24 for all actions now, ahead of the June 2026 forced migration.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Minimum macOS version the binaries will run on.
  MACOSX_DEPLOYMENT_TARGET: "12.0"

jobs:
  build-macos:
    name: Build (macOS Apple Silicon)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            localmind/src-tauri/target
          key: macos-rust-${{ hashFiles('localmind/src-tauri/Cargo.lock') }}
          restore-keys: macos-rust-

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: localmind/frontend/node_modules
          key: macos-node-${{ hashFiles('localmind/frontend/package-lock.json') }}
          restore-keys: macos-node-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: macos-pip-${{ hashFiles('localmind/backend/requirements.txt') }}
          restore-keys: macos-pip-

      - name: Install frontend dependencies
        run: cd localmind/frontend && npm install

      - name: Install Python dependencies
        run: cd localmind && pip install -r backend/requirements.txt pyinstaller

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Python sidecar
        run: cd localmind && python build_backend.py

      # Explicitly sign the PyInstaller sidecar binary with ad-hoc identity +
      # hardened runtime + entitlements before Tauri bundles it.
      # Without this, macOS 13+ Gatekeeper blocks the sidecar as an unsigned
      # helper process when the app is downloaded from the internet.
      - name: Sign Python sidecar (ad-hoc + entitlements)
        run: |
          SIDECAR=localmind/src-tauri/binaries/localmind-backend-aarch64-apple-darwin
          ENTITLEMENTS=localmind/src-tauri/entitlements.macos.plist
          codesign --force --sign - --options runtime \
            --entitlements "$ENTITLEMENTS" \
            "$SIDECAR"
          codesign --verify --verbose "$SIDECAR"

      - name: Build Tauri app
        run: cd localmind && cargo tauri build

      # Re-sign the full app bundle after Tauri's bundler to ensure every
      # Mach-O inside Contents/MacOS/ carries the same ad-hoc + runtime signature.
      - name: Re-sign app bundle (deep, ad-hoc + entitlements)
        run: |
          APP=localmind/src-tauri/target/release/bundle/macos/LocalMind.app
          ENTITLEMENTS=localmind/src-tauri/entitlements.macos.plist
          codesign --force --deep --sign - --options runtime \
            --entitlements "$ENTITLEMENTS" \
            "$APP"
          codesign --verify --deep --verbose "$APP"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-arm64
          path: localmind/src-tauri/target/release/bundle/dmg/*.dmg

