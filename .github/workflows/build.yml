name: Build LocalMind

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    name: Build (macOS Apple Silicon)
    runs-on:  macos-14


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            localmind/src-tauri/target
          key: macos-rust-${{ hashFiles('localmind/src-tauri/Cargo.lock') }}
          restore-keys: macos-rust-

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: localmind/frontend/node_modules
          key: macos-node-${{ hashFiles('localmind/frontend/package-lock.json') }}
          restore-keys: macos-node-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: macos-pip-${{ hashFiles('localmind/backend/requirements.txt') }}
          restore-keys: macos-pip-

      - name: Install frontend dependencies
        run: cd localmind/frontend && npm install

      - name: Install Python dependencies
        run: cd localmind && pip install -r backend/requirements.txt pyinstaller

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Python sidecar
        run: cd localmind && python build_backend.py

      - name: Build Tauri app
        run: cd localmind && cargo tauri build

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: localmind/src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            localmind/src-tauri/target
          key: windows-rust-${{ hashFiles('localmind/src-tauri/Cargo.lock') }}
          restore-keys: windows-rust-

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: localmind/frontend/node_modules
          key: windows-node-${{ hashFiles('localmind/frontend/package-lock.json') }}
          restore-keys: windows-node-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: windows-pip-${{ hashFiles('localmind/backend/requirements.txt') }}
          restore-keys: windows-pip-

      - name: Install frontend dependencies
        run: cd localmind/frontend && npm install

      - name: Install Python dependencies
        run: cd localmind && pip install -r backend/requirements.txt pyinstaller

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Python sidecar
        run: cd localmind && python build_backend.py

      - name: Build Tauri app
        run: cd localmind && cargo tauri build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: localmind/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: localmind/src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev || true

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            localmind/src-tauri/target
          key: linux-rust-${{ hashFiles('localmind/src-tauri/Cargo.lock') }}
          restore-keys: linux-rust-

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: localmind/frontend/node_modules
          key: linux-node-${{ hashFiles('localmind/frontend/package-lock.json') }}
          restore-keys: linux-node-

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: linux-pip-${{ hashFiles('localmind/backend/requirements.txt') }}
          restore-keys: linux-pip-

      - name: Install frontend dependencies
        run: cd localmind/frontend && npm install

      - name: Install Python dependencies
        run: cd localmind && pip install -r backend/requirements.txt pyinstaller

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Python sidecar
        run: cd localmind && python build_backend.py

      - name: Build Tauri app
        run: cd localmind && cargo tauri build

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: localmind/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: localmind/src-tauri/target/release/bundle/deb/*.deb

  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LocalMind ${{ github.ref_name }}
          body: |
            Download the right file for your platform:
            - macOS: .dmg
            - Windows: .exe or .msi
            - Linux: .AppImage or .deb
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/windows-msi/*.msi
            artifacts/windows-nsis/*.exe
            artifacts/linux-appimage/*.AppImage
            artifacts/linux-deb/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
